name: Run tests (main)

on:
  workflow_dispatch:
  push:
    paths:
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"
  schedule:
    - cron: "0 21 * * 0,3" # Run every Sunday and Wednesday at 21:00 UTC

jobs:
  test:
    uses: urob/zmk-actions/.github/workflows/run-tests.yml@9ebfa3ed81027d7907a8629f2085ae72e4c03b80 # v11.0.2
    with:
      toolchain: gnuarmemb
      zmk-version: main

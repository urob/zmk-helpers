name: Run tests (release)

on:
  workflow_dispatch:
  push:
    paths:
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"

jobs:
  test:
    uses: urob/zmk-actions/.github/workflows/run-tests.yml@ba0a55737f5f8c03a39cbb7cbd22cefbec0caf26 # v11.0.3
    with:
      toolchain: gnuarmemb
